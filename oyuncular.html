<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oyuncular — IDFB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="players">
  <h2 class="sr-only">IDFB – Oyuncular</h2>
  <div class="app">

    <!-- ── NAV ── -->
    <nav class="topnav">
      <div class="logo-mark" onclick="window.location.href='index.html'" style="cursor:pointer">
        <i class="ti ti-ball-football"></i>
      </div>
      <div class="logo-wrap" onclick="window.location.href='index.html'" style="cursor:pointer">
        <div class="logo-text"><em>IDFB</em></div>
        <div class="logo-sub">International Database of Football</div>
      </div>
      <div class="search-area">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Oyuncu ara…" oninput="handleSearch(this.value)" />
      </div>
      <div class="nav-pills">
        <div class="npill on">Oyuncular</div>
        <div class="npill" onclick="window.location.href='teknik-direktorler.html'">Teknik Direktörler</div>
      </div>
    </nav>

    <!-- ── PLAYERS VIEW ── -->
    <div class="home-view show" id="homeView">

      <!-- Page Hero -->
      <div class="page-hero">
        <div class="page-hero-inner">
          <a class="page-back-link" href="index.html"><i class="ti ti-arrow-left"></i>Ana Sayfa</a>
          <div class="page-hero-title"><em>Oyuncular</em></div>
          <div class="page-hero-sub">Dünya genelindeki futbolcuları keşfet, kariyerlerini incele ve istatistiklerine ulaş.</div>
        </div>
      </div>

      <!-- Card Grid -->
      <div class="main-section">
        <div class="sec-label">Tüm Oyuncular</div>
        <div class="card-grid" id="cardGrid"></div>
      </div>

    </div><!-- /home-view -->

    <!-- ── PROFILE VIEW ── -->
    <div class="profile-view" id="profileView">

      <div class="back-btn" onclick="goHome()">
        <i class="ti ti-arrow-left"></i>
        <span id="backLabel">Oyunculara dön</span>
      </div>

      <!-- Scout Hero -->
      <div class="scout-hero" id="scoutHero">
        <div class="scout-hero-main">
          <div class="scout-avatar-col">
            <div class="scout-avatar" id="scoutAvatar"></div>
            <div class="scout-overall" id="scoutOverall"></div>
          </div>
          <div class="scout-info-col">
            <div class="scout-top-badges" id="scoutTopBadges"></div>
            <div class="scout-name" id="scoutName"></div>
            <div class="scout-role" id="scoutRole"></div>
            <div class="scout-kpis" id="scoutKpis"></div>
          </div>
          <div class="scout-right-col">
            <div class="scout-value-card" id="scoutValueCard"></div>
            <div class="scout-fan-card" id="scoutFanCard"></div>
          </div>
        </div>
        <div class="scout-stats-bar" id="scoutStatsBar"></div>
      </div>

      <!-- AI Scout Summary -->
      <div class="scout-ai-banner" id="scoutAiBanner"></div>

      <div class="stabs" id="stabs"></div>
      <div class="pcontent" id="pcontent"></div>

    </div><!-- /profile-view -->

  </div><!-- /app -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
